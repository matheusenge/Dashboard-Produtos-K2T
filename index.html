<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Produtos — Stellantis K2T</title>
    <script src="tailwind-config.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen">

  <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"
    aria-live="polite"></div>

  <header class="sticky top-0 z-50 border-b border-border-subtle bg-base-light/80 backdrop-blur-xl">
    <div class="max-w-[1680px] mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <img
          src="https://z-cdn-media.chatglm.cn/files/3323a8b1-e0e2-4d40-8889-c4c421cbbce9.png?auth_key=1883274642-64d03c6002c94a0591c4db1be9e49f7c-0-3dd3ea961e7e4fc5d24d161ba6c730f7"
          alt="Stellantis" class="h-8 sm:h-9 w-auto object-contain shrink-0"
          style="mix-blend-mode: multiply; filter: brightness(8) contrast(0.85);"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="hidden items-center shrink-0">
          <div class="w-9 h-9 rounded-lg bg-accent flex items-center justify-center shadow-lg shadow-accent/20">
            <i class="fa-solid fa-gear text-white text-sm"></i>
          </div>
        </div>
        <div class="min-w-0">
          <h1 class="font-display font-bold text-base leading-tight truncate">Stellantis K2T</h1>
          <p class="text-[11px] text-txt-muted leading-tight">Painel de Produtos</p>
        </div>
      </div>

      <div class="flex items-center gap-3 sm:gap-4 shrink-0">
        <span id="status-text" class="text-[11px] text-txt-muted hidden sm:inline"></span>
        <div class="flex items-center gap-2">
          <span class="text-[11px] text-txt-secondary hidden sm:inline">Auto</span>
          <div id="toggle-refresh" class="toggle-track on" role="switch" aria-checked="true"
            aria-label="Atualização automática" tabindex="0">
            <div class="toggle-knob"></div>
          </div>
        </div>
        <button id="btn-refresh" onclick="carregarDados(true)"
          class="w-9 h-9 rounded-lg border border-border bg-surface hover:bg-surface-hover flex items-center justify-center transition-colors"
          aria-label="Atualizar dados">
          <i class="fa-solid fa-arrows-rotate text-txt-secondary text-sm" id="refresh-icon"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-[1680px] mx-auto px-4 sm:px-6 py-6">

    <div id="state-loading" class="space-y-6">
      <div class="grid grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="h-24 rounded-xl shimmer"></div>
        <div class="h-24 rounded-xl shimmer"></div>
        <div class="h-24 rounded-xl shimmer"></div>
      </div>
      <div class="h-12 rounded-lg shimmer"></div>
      <div class="h-96 rounded-xl shimmer"></div>
    </div>

    <div id="state-error" class="hidden">
      <div class="max-w-md mx-auto text-center py-20 anim-fade-up">
        <div class="w-16 h-16 rounded-2xl bg-err-subtle flex items-center justify-center mx-auto mb-5">
          <i class="fa-solid fa-triangle-exclamation text-err text-2xl"></i>
        </div>
        <h2 class="font-display font-bold text-xl mb-2">Erro ao carregar dados</h2>
        <p id="error-msg" class="text-txt-secondary text-sm mb-6">Não foi possível ler o arquivo de dados.</p>
        <button onclick="carregarDados(true)"
          class="px-5 py-2.5 rounded-lg bg-surface border border-border hover:bg-surface-hover text-sm font-medium transition-colors">
          <i class="fa-solid fa-arrows-rotate mr-2"></i>Tentar novamente
        </button>
      </div>
    </div>

    <div id="state-empty" class="hidden">
      <div class="max-w-md mx-auto text-center py-20 anim-fade-up">
        <div class="w-16 h-16 rounded-2xl bg-accent-subtle flex items-center justify-center mx-auto mb-5">
          <i class="fa-solid fa-box-open text-accent text-2xl"></i>
        </div>
        <h2 class="font-display font-bold text-xl mb-2">Nenhum dado disponível</h2>
        <p class="text-txt-secondary text-sm mb-6">Execute a automação primeiro para gerar os dados do dashboard.</p>
        <div
          class="inline-flex items-center gap-2 px-4 py-2.5 rounded-lg bg-surface border border-border text-sm text-txt-secondary">
          <i class="fa-solid fa-terminal"></i>
          <code>2_RODAR_AUTOMACAO.bat</code>
        </div>
      </div>
    </div>

    <div id="state-data" class="hidden space-y-5">

      <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4" id="stats-grid"></div>

      <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center justify-between">
        <div class="relative flex-1 max-w-lg">
          <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-txt-muted text-xs"></i>
          <input type="text" id="search-input" placeholder="Pesquisar em qualquer coluna..."
            class="w-full h-10 pl-10 pr-4 rounded-lg bg-surface border border-border text-sm text-txt placeholder:text-txt-muted focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all">
        </div>

        <div class="flex gap-2 shrink-0">
          <button onclick="baixarXLSX()"
            class="btn-download h-10 px-4 rounded-lg bg-accent hover:bg-accent-hover text-white text-sm font-medium flex items-center gap-2 transition-colors shadow-lg shadow-accent/20">
            <i class="fa-solid fa-file-excel text-xs"></i>
            <span class="hidden sm:inline">Baixar XLSX</span>
            <span class="sm:hidden">XLSX</span>
          </button>
          <button onclick="baixarCSV()"
            class="btn-download h-10 px-4 rounded-lg bg-surface border border-border hover:bg-surface-hover text-txt text-sm font-medium flex items-center gap-2 transition-colors">
            <i class="fa-solid fa-file-csv text-xs text-ok"></i>
            <span class="hidden sm:inline">Baixar CSV</span>
            <span class="sm:hidden">CSV</span>
          </button>
          <button onclick="copiarTabela()"
            class="h-10 w-10 rounded-lg bg-surface border border-border hover:bg-surface-hover flex items-center justify-center transition-colors"
            title="Copiar dados para área de transferência" aria-label="Copiar dados">
            <i class="fa-regular fa-clipboard text-txt-secondary text-sm"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between text-[11px] text-txt-muted px-1">
        <span id="info-count"></span>
        <div class="flex items-center gap-2">
          <span>Itens/página:</span>
          <select id="page-size"
            class="bg-surface border border-border-subtle rounded px-2 py-1 text-txt text-[11px] focus:outline-none focus:border-accent/60 cursor-pointer">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="500">500</option>
          </select>
        </div>
      </div>

      <div class="border border-border rounded-xl overflow-hidden shadow-2xl shadow-black/30">
        <div class="overflow-x-auto" style="max-height: 62vh;" id="table-scroll">
          <table class="w-full text-sm tbl-sticky-first">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>

      <div id="pagination" class="flex items-center justify-center gap-1.5 flex-wrap"></div>
    </div>
  </main>

  <footer class="border-t border-border-subtle mt-8">
    <div class="max-w-[1680px] mx-auto px-6 py-4 flex items-center justify-between text-[11px] text-txt-muted">
      <span>Stellantis K2T — Automação de Produtos</span>
      <span id="footer-time"></span>
    </div>
  </footer>
  <script src="app.js"></script>
</body>

</html>
